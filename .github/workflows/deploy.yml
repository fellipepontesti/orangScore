name: Deploy para DigitalOcean

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Executar deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            # Carrega o ambiente do Ruby (rbenv / rvm) e caminhos da VPS
            export PATH="$HOME/.rbenv/bin:$HOME/.rbenv/shims:$HOME/.rvm/bin:$PATH"
            if [ -f "$HOME/.profile" ]; then source "$HOME/.profile"; fi
            if [ -f "$HOME/.bashrc" ]; then source "$HOME/.bashrc"; fi

            APP_DIR="/home/deploy/orangScore"
            cd $APP_DIR

            git pull origin master

            set -a
            source /etc/orangscore.env
            set +a

            bundle config set without 'development test'
            bundle install

            yarn install

            RAILS_ENV=production bundle exec rails tmp:clear
            RAILS_ENV=production bundle exec rails log:clear
            RAILS_ENV=production bundle exec rails db:migrate
            RAILS_ENV=production bundle exec rails assets:precompile

            # Reinicia o Puma de forma suave tocando no arquivo restart.txt (não exige sudo/senha)
            touch tmp/restart.txt