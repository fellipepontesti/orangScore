version: '3.9'

services:
  app:
    build: .
    container_name: orangscore_app
    env_file: .env
    depends_on:
      - db
    ports:
      - "3000:3000"
    restart: always

  db:
    image: postgres:14
    container_name: orangscore_db
    environment:
      POSTGRES_DB: orang_score_production
      POSTGRES_USER: deploy
      POSTGRES_PASSWORD: root
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data: